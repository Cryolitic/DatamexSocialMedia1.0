<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-body">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="h4 mb-3 text-dark">Reset Password</h2>
                        <p class="text-muted mb-4">Enter your new password below.</p>

                        <form id="resetPasswordForm">
                            <div class="mb-3">
                                <label for="newPassword" class="form-label text-dark">New Password</label>
                                <div class="password-input-wrapper">
                                    <input type="password" id="newPassword" class="form-control pe-5" required>
                                    <i class="fas fa-eye toggle-password" id="toggleNewPassword"></i>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label text-dark">Confirm Password</label>
                                <div class="password-input-wrapper">
                                    <input type="password" id="confirmPassword" class="form-control pe-5" required>
                                    <i class="fas fa-eye toggle-password" id="toggleConfirmPassword"></i>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Update Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const form = document.getElementById('resetPasswordForm');
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const setupPasswordToggle = (toggleId, inputId) => {
                const toggle = document.getElementById(toggleId);
                const input = document.getElementById(inputId);
                if (!toggle || !input) return;
                toggle.addEventListener('click', () => {
                    const nextType = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', nextType);
                    toggle.classList.toggle('fa-eye');
                    toggle.classList.toggle('fa-eye-slash');
                });
            };
            setupPasswordToggle('toggleNewPassword', 'newPassword');
            setupPasswordToggle('toggleConfirmPassword', 'confirmPassword');

            const showExpiredModalAndRedirect = (message) => {
                Swal.fire({
                    icon: 'error',
                    title: 'Reset Link Expired',
                    text: message || 'Your reset link is invalid or expired. Please request a new one.',
                    confirmButtonText: 'OK',
                    confirmButtonColor: '#0a1628',
                    allowOutsideClick: false,
                    allowEscapeKey: false
                }).then(() => {
                    window.location.href = 'index.html';
                });
            };

            if (!token) {
                showExpiredModalAndRedirect('Reset token is missing.');
                return;
            }

            try {
                const res = await fetch('api/reset_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'validate', token })
                });
                const data = await res.json();

                if (!data.success) {
                    showExpiredModalAndRedirect(data.message);
                    return;
                }
            } catch (err) {
                showExpiredModalAndRedirect('Unable to validate reset link right now.');
                return;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (newPassword !== confirmPassword) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Password Mismatch',
                        text: 'Passwords do not match.',
                        confirmButtonColor: '#0a1628'
                    });
                    return;
                }

                const res = await fetch('api/reset_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'reset', token, newPassword })
                });
                const data = await res.json();

                if (!data.success) {
                    showExpiredModalAndRedirect(data.message);
                    return;
                }

                Swal.fire({
                    icon: 'success',
                    title: 'Password Updated',
                    text: 'You can now sign in with your new password.',
                    confirmButtonColor: '#0a1628'
                }).then(() => {
                    window.location.href = 'index.html';
                });
            });
        });
        
    </script>
    
</body>
</html>
