<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCSA Campus Connect - Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-body">
    <div class="login-wrapper">
        <!-- Left Side - Dark Blue -->
        <div class="login-left">
            <div class="login-left-content">
                <div class="logo-section-left">
                    <img src="imagesrc/logo.jpg" alt="DCSA Logo" class="school-logo-left" onerror="this.style.display='none';">
                    <div class="logo-text">
                        <h1 class="dcsa-title">DCSA</h1>
                        <h2 class="campus-connect">Campus Connect</h2>
                    </div>
                </div>
                <div class="promo-text">
                    <p class="promo-main">Join the exclusive social network for students and faculty,</p>
                    <p class="promo-sub">Connect, collaborate, and stay updated.</p>
                </div>
            </div>
        </div>

        <!-- Right Side - White -->
        <div class="login-right">
            <div class="login-form-container">
                <h2 class="welcome-title">Forgot Password?</h2>
                <p class="welcome-subtitle">enter your student/faculty ID to reset your password</p>
                
                <form id="forgotPasswordForm" class="login-form">
                    <div class="form-group-custom">
                        <label class="form-label-custom">student/faculty ID</label>
                        <input type="text" id="forgotStudentId" class="form-control-custom" placeholder="e.g 2023-12345" required>
                    </div>
                    
                    <div class="form-group-custom">
                        <label class="form-label-custom">email address</label>
                        <input type="email" id="forgotEmail" class="form-control-custom" placeholder="e.g juan@dcsa.edu" required>
                    </div>
                    
                    <button type="submit" class="btn-login-custom">
                        Send Reset Link
                    </button>
                </form>
                
                <div class="register-link">
                    <p>remember your password? <a href="index.html">sign in</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/forgot-password.js"></script>
</body>
</html>
