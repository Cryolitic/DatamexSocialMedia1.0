<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCSA Campus Connect - Login</title>
    <script>
        // Prevent "blink" by redirecting before the page paints if already logged in.
        (function () {
            try {
                if (localStorage.getItem('user')) {
                    window.location.replace('home.html');
                }
            } catch (e) {}
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-body">
    <div class="login-wrapper">
        <!-- Left Side - Dark Blue -->
        <div class="login-left">
            <div class="login-left-content">
                <div class="logo-section-left">
                    <img src="imagesrc/logo.png" alt="DCSA Logo" class="school-logo-left" onerror="this.style.display='none';">
                    <div class="logo-text">
                        <h1 class="dcsa-title">DCSA</h1>
                        <h2 class="campus-connect">Campus Connect</h2>
                    </div>
                </div>
                <div class="promo-text">
                    <p class="promo-main">Join the exclusive social network for students and faculty,</p>
                    <p class="promo-sub">Connect, collaborate, and stay updated.</p>
                </div>
            </div>
        </div>

        <!-- Right Side - White -->
        <div class="login-right">
            <div class="login-form-container">
                <h2 class="welcome-title">Welcome back!</h2>
                <p class="welcome-subtitle">please enter you details to sign</p>
                
                <form id="loginForm" class="login-form">
                    <div class="form-group-custom">
                        <label class="form-label-custom">email</label>
                        <input type="email" id="username" class="form-control-custom" placeholder="e.g user@example.com" required>
                    </div>
                    
                    <div class="form-group-custom">
                        <div class="password-label-row">
                            <label class="form-label-custom">password:</label>
                            <a href="forgot-password.html" class="forgot-link">forgot password</a>
                        </div>
                        <div class="password-input-wrapper">
                            <input type="password" id="password" class="form-control-custom" placeholder="Enter your password" required>
                            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-login-custom">
                        Sign In
                    </button>
                </form>
                
                <div class="register-link">
                    <p>don't have an account? <a href="register.html">register now</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/login.js"></script>
</body>
</html>
